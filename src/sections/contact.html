<section id="contact">
  <h2>Contact</h2>
  <div class="contact-container">
    <!-- Left Column: Form -->
    <div class="contact-form-wrapper">
      <h3 class="contact-subtitle">Send Me a Message</h3>
      <form id="contact-form" class="contact-form">
        <div class="input-group">
          <input
            type="text"
            id="sender-name"
            name="name"
            required
            placeholder=" "
            autocomplete="name"
          />
          <label for="sender-name">Your Name</label>
        </div>
        <div class="input-group">
          <input
            type="email"
            id="sender-email"
            name="email"
            required
            placeholder=" "
            autocomplete="email"
          />
          <label for="sender-email">Your Email</label>
        </div>
        <div class="input-group">
          <textarea
            id="sender-message"
            name="message"
            rows="5"
            required
            placeholder=" "
          ></textarea>
          <label for="sender-message">Your Message</label>
        </div>
        <button type="submit" class="btn submit-btn" id="submit-btn">
          <span>Send Message</span>
          <div class="btn-glow"></div>
        </button>
        <p id="form-status" class="form-status"></p>
      </form>
    </div>

    <!-- Right Column: Info & Links -->
    <div class="contact-info-wrapper">
      <h3 class="contact-subtitle">Connect With Me</h3>
      <p class="contact-text">
        Feel free to reach out to me through this form, or connect with me
        directly on my socials.
      </p>
      <div class="contact-details">
        <div class="contact-item-card">
          <div class="contact-icon-wrapper">
            <svg><use xlink:href="assets/images/icons.svg#icon-email"></use></svg>
          </div>
          <div class="contact-info">
            <span class="contact-label">Email</span>
            <a
              href="mailto:quenedypabular12@gmail.com"
              class="contact-value"
              >quenedypabular12@gmail.com</a
            >
          </div>
        </div>

        <div class="contact-item-card">
          <div class="contact-icon-wrapper">
            <svg><use xlink:href="assets/images/icons.svg#icon-phone"></use></svg>
          </div>
          <div class="contact-info">
            <span class="contact-label">Mobile</span>
            <a href="tel:+639676233104" class="contact-value"
              >+63 967 6233 104</a
            >
          </div>
        </div>
      </div>

      <div class="social-grid">
        <a
          href="https://profile.indeed.com/?hl=en_PH&co=PH&from=gnav-homepage"
          target="_blank"
          class="social-icon"
          title="Indeed"
          aria-label="Visit Indeed Profile"
        >
          <svg><use xlink:href="assets/images/icons.svg#icon-indeed"></use></svg>
        </a>
        <a
          href="https://www.linkedin.com/in/quenedy-pabular-789485376/"
          target="_blank"
          class="social-icon"
          title="LinkedIn"
          aria-label="Visit LinkedIn Profile"
        >
          <svg><use xlink:href="assets/images/icons.svg#icon-linkedin"></use></svg>
        </a>
        <a
          href="https://github.com/QuenDev"
          target="_blank"
          class="social-icon"
          title="GitHub"
          aria-label="Visit GitHub Profile"
        >
          <svg><use xlink:href="assets/images/icons.svg#icon-github"></use></svg>
        </a>
        <a
          href="https://www.facebook.com/quenedy.r.pabular/"
          target="_blank"
          class="social-icon"
          title="Facebook"
          aria-label="Visit Facebook Profile"
        >
          <svg><use xlink:href="assets/images/icons.svg#icon-facebook"></use></svg>
        </a>
        <a
          href="https://www.instagram.com/quenedyramos/"
          target="_blank"
          class="social-icon"
          title="Instagram"
          aria-label="Visit Instagram Profile"
        >
          <svg><use xlink:href="assets/images/icons.svg#icon-instagram"></use></svg>
        </a>
      </div>
    </div>
  </div>
</section>
