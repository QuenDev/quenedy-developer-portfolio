<div id="lightbox">
  <button class="lightbox-close" aria-label="Close lightbox">
    &#10005;
  </button>
  <div class="lightbox-container">
    <div class="lightbox-details">
      <div class="details-content">
        <h2 id="lightbox-title">Project Name</h2>
        <p id="lightbox-description">Project description goes here.</p>

        <div class="lightbox-tech">
          <h3>Tech Stack Used</h3>
          <div id="lightbox-tech-list" class="tech-tags-container">
            <!-- Tech tags will be injected here -->
          </div>
        </div>

        <div class="lightbox-actions">
          <a
            id="lightbox-github"
            href="#"
            target="_blank"
            class="source-button"
          >
            <i class="devicon-github-original"></i>
            <span>View Source Code</span>
          </a>
        </div>
      </div>
    </div>

    <div class="lightbox-gallery">
      <button class="lightbox-btn prev" aria-label="Previous image">
        &#8249;
      </button>
      <div class="lightbox-img-wrapper">
        <img id="lightbox-img" src="" alt="Project Preview" />
      </div>
      <button class="lightbox-btn next" aria-label="Next image">
        &#8250;
      </button>
      <div
        class="lightbox-dots"
        aria-label="Image selection indicators"
      ></div>
    </div>
  </div>
</div>
